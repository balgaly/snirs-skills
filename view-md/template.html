<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}}</title>
<link id="hljs-theme" rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<style>
  /* ── Theme tokens ── */
  :root[data-theme="dark"] {
    --bg: #0b0e14;
    --surface: #131620;
    --surface-raised: #1a1e2a;
    --border: #252a37;
    --text: #d4d9e6;
    --text-secondary: #8891a5;
    --accent: #6366f1;
    --accent-hover: #818cf8;
    --link: #7cacf8;
    --code-bg: #161a26;
    --shadow: rgba(0,0,0,0.4);
    --toggle-bg: #252a37;
  }
  :root[data-theme="light"] {
    --bg: #f5f6f8;
    --surface: #ffffff;
    --surface-raised: #f0f1f4;
    --border: #dcdfe6;
    --text: #1a1d26;
    --text-secondary: #5c6270;
    --accent: #4f46e5;
    --accent-hover: #6366f1;
    --link: #3b5cc6;
    --code-bg: #f0f1f4;
    --shadow: rgba(0,0,0,0.06);
    --toggle-bg: #dcdfe6;
  }

  /* ── Reset & base ── */
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.75;
    padding: 2.5rem 1.25rem;
    transition: background 0.3s ease, color 0.3s ease;
  }

  /* ── Layout ── */
  .container {
    max-width: 860px;
    margin: 0 auto;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 3rem 3.5rem;
    box-shadow: 0 4px 24px var(--shadow);
    transition: background 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-bottom: 1.5rem;
    margin-bottom: 2rem;
    border-bottom: 1px solid var(--border);
  }
  .header-left { display: flex; align-items: center; gap: 0.75rem; }
  .header h1 {
    font-size: 0.85rem;
    color: var(--text-secondary);
    font-weight: 500;
    letter-spacing: 0.02em;
  }
  .badge {
    display: inline-block;
    background: var(--accent);
    color: white;
    padding: 0.2rem 0.6rem;
    border-radius: 6px;
    font-size: 0.65rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  /* ── Theme toggle ── */
  .theme-toggle {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--toggle-bg);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
    transition: background 0.2s ease, border-color 0.2s ease, transform 0.15s ease;
    flex-shrink: 0;
  }
  .theme-toggle:hover {
    border-color: var(--accent);
    transform: scale(1.05);
  }
  .theme-toggle:active { transform: scale(0.95); }

  /* ── Typography ── */
  #content h1 {
    font-size: 1.85rem;
    font-weight: 700;
    margin: 2.5rem 0 1rem;
    color: var(--text);
    letter-spacing: -0.02em;
    border-bottom: 2px solid var(--border);
    padding-bottom: 0.6rem;
  }
  #content h2 {
    font-size: 1.4rem;
    font-weight: 650;
    margin: 2.2rem 0 0.75rem;
    color: var(--text);
    letter-spacing: -0.01em;
  }
  #content h3 {
    font-size: 1.15rem;
    font-weight: 600;
    margin: 1.8rem 0 0.6rem;
    color: var(--text);
  }
  #content h4 {
    font-weight: 600;
    margin: 1.4rem 0 0.5rem;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    font-size: 0.85rem;
  }
  #content p { margin: 0.75rem 0; }
  #content strong { font-weight: 650; }

  /* ── Links ── */
  #content a {
    color: var(--link);
    text-decoration: none;
    border-bottom: 1px solid transparent;
    transition: border-color 0.15s ease;
  }
  #content a:hover { border-bottom-color: var(--link); }

  /* ── Lists ── */
  #content ul, #content ol { margin: 0.75rem 0; padding-left: 1.75rem; }
  #content li { margin: 0.25rem 0; }
  #content li::marker { color: var(--text-secondary); }
  #content li input[type="checkbox"] { margin-right: 0.5rem; accent-color: var(--accent); }

  /* ── Blockquote ── */
  #content blockquote {
    border-left: 3px solid var(--accent);
    padding: 0.6rem 1.2rem;
    margin: 1.25rem 0;
    background: var(--surface-raised);
    border-radius: 0 10px 10px 0;
    color: var(--text-secondary);
  }

  /* ── Inline code ── */
  #content code {
    background: var(--code-bg);
    padding: 0.15rem 0.45rem;
    border-radius: 5px;
    font-size: 0.875em;
    font-family: 'Cascadia Code', 'Fira Code', 'JetBrains Mono', ui-monospace, monospace;
    border: 1px solid var(--border);
  }

  /* ── Code blocks ── */
  #content pre {
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.1rem 1.25rem;
    overflow-x: auto;
    margin: 1.25rem 0;
    position: relative;
  }
  #content pre code {
    background: none;
    padding: 0;
    border: none;
    font-size: 0.825em;
    line-height: 1.65;
  }

  /* ── Copy button on code blocks ── */
  .code-wrapper { position: relative; }
  .copy-btn {
    position: absolute;
    top: 0.5rem;
    right: 0.5rem;
    background: var(--surface-raised);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.3rem 0.5rem;
    font-size: 0.7rem;
    color: var(--text-secondary);
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.15s ease, background 0.15s ease;
    font-family: inherit;
  }
  .code-wrapper:hover .copy-btn { opacity: 1; }
  .copy-btn:hover { background: var(--accent); color: white; border-color: var(--accent); }

  /* ── Tables ── */
  #content table {
    width: 100%;
    border-collapse: collapse;
    margin: 1.25rem 0;
    font-size: 0.875em;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid var(--border);
  }
  #content th {
    background: var(--surface-raised);
    padding: 0.65rem 0.9rem;
    text-align: left;
    font-weight: 600;
    font-size: 0.8em;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--text-secondary);
    border-bottom: 1px solid var(--border);
  }
  #content td {
    padding: 0.6rem 0.9rem;
    border-bottom: 1px solid var(--border);
  }
  #content tr:last-child td { border-bottom: none; }
  #content tr:hover td { background: var(--surface-raised); }

  /* ── Horizontal rule ── */
  #content hr {
    border: none;
    height: 1px;
    background: var(--border);
    margin: 2.5rem 0;
  }

  /* ── Images ── */
  #content img {
    max-width: 100%;
    border-radius: 10px;
    margin: 1.25rem 0;
    border: 1px solid var(--border);
  }

  #content del { color: var(--text-secondary); }

  /* ── Print ── */
  @media print {
    body { background: white; color: #111; padding: 0; }
    .container { box-shadow: none; border: none; background: white; padding: 1rem; }
    .header .badge, .theme-toggle, .copy-btn { display: none; }
    #content a { color: #1a4db0; }
    #content pre, #content code { background: #f3f4f6; border-color: #d1d5db; }
    #content th { background: #f3f4f6; }
  }

  /* ── Mobile ── */
  @media (max-width: 640px) {
    body { padding: 1rem 0.5rem; }
    .container { padding: 1.5rem 1.25rem; border-radius: 10px; }
    #content h1 { font-size: 1.5rem; }
    #content h2 { font-size: 1.2rem; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="header-left">
      <h1>{{TITLE}}</h1>
      <span class="badge">MD</span>
    </div>
    <button class="theme-toggle" id="themeToggle" type="button" title="Toggle dark/light mode" aria-label="Toggle dark/light mode"></button>
  </div>
  <div id="content"></div>
</div>

<script id="md-source" type="text/plain">
{{MD_CONTENT}}
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js" integrity="sha384-3zf4Pen4fXU90jGg3cxmo7BF4dq8HMtF2s07c/Hhd1Fh+Encm6ApPvNm8vrMJbWu" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js" integrity="sha384-F/bZzf7p3Joyp5psL90p/p89AZJsndkSoGwRpXcZhleCWhd8SnRuoYo4d0yirjJp" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.1.6/purify.min.js" integrity="sha384-+VfUPEb0PdtChMwmBcBmykRMDd+v6D/oFmB3rZM/puCMDYcIvF968OimRh4KQY9a" crossorigin="anonymous"></script>
<script>
  // ── Theme toggle ──
  var THEME_KEY = 'md-preview-theme';
  var html = document.documentElement;
  var toggle = document.getElementById('themeToggle');
  var hljsLink = document.getElementById('hljs-theme');

  function getStoredTheme() {
    try { return localStorage.getItem(THEME_KEY); } catch (e) { return null; }
  }

  function setTheme(theme) {
    html.setAttribute('data-theme', theme);
    toggle.textContent = theme === 'dark' ? '\u{1F319}' : '\u{2600}\u{FE0F}';
    var hljsStyle = theme === 'dark' ? 'github-dark' : 'github';
    hljsLink.href = 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/' + hljsStyle + '.min.css';
    try { localStorage.setItem(THEME_KEY, theme); } catch (e) { /* localStorage unavailable */ }
  }

  setTheme(getStoredTheme() || 'dark');

  toggle.addEventListener('click', function() {
    setTheme(html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
  });

  // ── Render markdown ──
  // Content is read from a <script type="text/plain"> tag (never parsed as HTML),
  // rendered by marked.js, then sanitized by DOMPurify before DOM insertion.
  marked.setOptions({
    gfm: true,
    breaks: false,
    highlight: function(code, lang) {
      if (lang && hljs.getLanguage(lang)) {
        return hljs.highlight(code, { language: lang }).value;
      }
      return hljs.highlightAuto(code).value;
    }
  });

  var mdSource = document.getElementById('md-source').textContent;
  var rawHtml = marked.parse(mdSource);
  var sanitized = DOMPurify.sanitize(rawHtml);
  document.getElementById('content').innerHTML = sanitized;

  // ── Add copy buttons to code blocks ──
  document.querySelectorAll('#content pre').forEach(function(pre) {
    var wrapper = document.createElement('div');
    wrapper.className = 'code-wrapper';
    pre.parentNode.insertBefore(wrapper, pre);
    wrapper.appendChild(pre);

    var btn = document.createElement('button');
    btn.className = 'copy-btn';
    btn.textContent = 'Copy';
    btn.setAttribute('type', 'button');
    btn.addEventListener('click', function() {
      var codeEl = pre.querySelector('code');
      var text = codeEl ? codeEl.textContent : pre.textContent;

      // 3-tier clipboard fallback for file:// URL compatibility
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(function() {
          btn.textContent = 'Copied!';
          setTimeout(function() { btn.textContent = 'Copy'; }, 1500);
        });
      } else {
        var textarea = document.createElement('textarea');
        textarea.value = text;
        textarea.style.position = 'fixed';
        textarea.style.opacity = '0';
        document.body.appendChild(textarea);
        textarea.select();
        try {
          document.execCommand('copy');
          btn.textContent = 'Copied!';
          setTimeout(function() { btn.textContent = 'Copy'; }, 1500);
        } catch (e) {
          btn.textContent = 'Failed';
        }
        document.body.removeChild(textarea);
      }
    });
    wrapper.appendChild(btn);
  });
</script>
</body>
</html>
